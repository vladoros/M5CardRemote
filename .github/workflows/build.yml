name: Build

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: ${{ vars.VERSION || '0.1' }}

jobs:
  build:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - run: make install

      - run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: M5CardRemote-${{ env.VERSION }}-${{ github.sha }}
          path: build/M5CardRemote-${{ env.VERSION }}.bin